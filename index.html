<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Website</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <h1>My Recipe Website</h1>
        </div>
    </header>

    <main class="main-container">

        <section id="recipesListSection" class="recipes-list-section">
            <div class="search-box">
                <label for="searchInput">Search recipe:</label>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Type a recipe name..."
                >
            </div>

            <p id="statusMessage" class="status-message">Loading recipes...</p>

            <div id="recipesContainer" class="recipes-container"></div>
        </section>

        <section id="recipeDetailsSection" class="recipe-details-section hidden">
            <button id="backButton" class="back-button">Back to recipe list</button>

            <article id="recipeDetails" class="recipe-details"></article>
        </section>

    </main>

   

</body>
</html>
